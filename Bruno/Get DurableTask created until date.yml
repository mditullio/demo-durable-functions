info:
  name: Get DurableTask created until date
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/runtime/webhooks/durabletask/instances?code={{code}}&createdTimeTo=2026-04-05T23:53:39Z"
  params:
    - name: code
      value: "{{code}}"
      type: query
    - name: createdTimeTo
      value: 2026-04-05T23:53:39Z
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

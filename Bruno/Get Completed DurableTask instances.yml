info:
  name: Get Completed DurableTask instances
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/runtime/webhooks/durabletask/instances?code={{code}}&runtimeStatus=Completed"
  params:
    - name: code
      value: "{{code}}"
      type: query
    - name: runtimeStatus
      value: Completed
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

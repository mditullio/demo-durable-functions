info:
  name: Get DurableTask instance by ID
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/runtime/webhooks/durabletask/instances/{{instanceId}}?code={{code}}&showHistory=true&showHistoryOutput=true"
  params:
    - name: code
      value: "{{code}}"
      type: query
    - name: showHistory
      value: "true"
      type: query
    - name: showHistoryOutput
      value: "true"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
